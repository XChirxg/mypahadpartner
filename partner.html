<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Partner – MyPahad</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="mp.css"/>
<style>
body{padding-bottom:62px;overflow-x:hidden;}
.auth-wrap{max-width:400px;margin:0 auto;}
.auth-hero{background:var(--g);padding:28px 14px 18px;text-align:center;}
.auth-hero-logo{font-size:26px;font-weight:700;color:#fff;letter-spacing:-0.5px;}
.auth-hero-sub{font-size:11px;color:rgba(255,255,255,0.65);margin-top:4px;}
.auth-card{background:#fff;padding:18px 16px;border-radius:0 0 var(--r) var(--r);}
.atabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:14px;}
.atab{flex:1;text-align:center;padding:9px;font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.atab.on{color:var(--g);border-bottom-color:var(--g);}
.lnk{color:var(--g);font-size:11px;cursor:pointer;background:none;border:none;padding:0;font-family:inherit;}
.cac-wrap{position:relative;}
.cac-drop{position:absolute;top:calc(100% + 2px);left:0;right:0;background:#fff;border:1px solid var(--g);border-radius:var(--rs);z-index:300;max-height:170px;overflow-y:auto;display:none;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.cac-drop.open{display:block;}
.cac-item{padding:7px 10px;font-size:12px;cursor:pointer;border-bottom:1px solid #f0f0f0;}
.cac-item:last-child{border-bottom:none;}
.cac-item:hover{background:var(--gl);}
.cac-item-new::after{content:'+ Create';font-size:10px;background:var(--gl);color:var(--g);padding:1px 5px;border-radius:2px;margin-left:6px;}
.cac-pill{display:inline-flex;align-items:center;gap:4px;background:var(--gl);color:var(--g);border:1px solid #b5d9c5;border-radius:var(--rs);padding:2px 7px 2px 8px;font-size:11px;font-weight:600;margin-top:4px;}
.cac-pill button{background:none;border:none;color:var(--g);font-size:13px;line-height:1;padding:0;cursor:pointer;}
</style>
</head>
<body>
<div id="toast"></div>

<!-- ============ AUTH ============ -->
<div class="auth-wrap">
  <div class="auth-hero">
    <div class="auth-hero-logo">🏔 MyPahad</div>
    <div class="auth-hero-sub">Partner &amp; Business Portal</div>
  </div>
  <div style="padding:0 12px 14px;">
    <div class="auth-card">
      <div class="atabs">
        <div class="atab on" id="atab-login" onclick="authTab('login')">Login</div>
        <div class="atab" id="atab-reg" onclick="authTab('reg')">Register</div>
      </div>

      <!-- LOGIN -->
      <div id="flogin">
        <div class="fg"><label>Email</label><input type="email" id="le" placeholder="your@email.com"/></div>
        <div class="fg"><label>Password</label><input type="password" id="lp" placeholder="Password"/></div>
        <div id="lerr" class="err"></div>
        <button class="btn-pri" onclick="doLogin()">Login →</button>
        <div style="text-align:center;margin-top:10px;"><button class="lnk" onclick="doForgot()">Forgot password?</button></div>
      </div>

      <!-- REGISTER -->
      <div id="freg" class="hidden">
        <div class="fg"><label>Business Name *</label><input type="text" id="rname" placeholder="e.g. Sharma General Store"/></div>
        <div class="fg"><label>Username *</label><input type="text" id="ruser" placeholder="e.g. sharmastore" oninput="chkUser(this.value)"/><small id="ustat" style="font-size:10px;"></small></div>
        <div class="fg"><label>Town *</label><select id="rarea"></select></div>
        <div class="fg">
          <label>Business Category</label>
          <div class="cac-wrap">
            <input type="text" id="rcac-inp" placeholder="e.g. Grocery, Tailoring…" autocomplete="off" oninput="catAC('rcac',this.value)" onfocus="catAC('rcac',this.value)"/>
            <div class="cac-drop" id="rcac-drop"></div>
          </div>
          <input type="hidden" id="rcac-id"/>
          <div id="rcac-pill"></div>
        </div>
        <div class="fg"><label>Type *</label><select id="rtype"><option value="product">Products</option><option value="service">Services</option><option value="both">Both</option></select></div>
        <div class="fg"><label>WhatsApp *</label><input type="tel" id="rwa" placeholder="9876543210"/></div>
        <div class="fg"><label>Phone</label><input type="tel" id="rph" placeholder="9876543210"/></div>
        <div class="fg"><label>Address</label><input type="text" id="raddr" placeholder="Shop no, Street, Village"/></div>
        <div class="fg"><label>Description</label><textarea id="rdesc" rows="2" placeholder="Tell customers about you..."></textarea></div>
        <div class="fg"><label>Email *</label><input type="email" id="remail" placeholder="your@email.com"/></div>
        <div class="fg"><label>Password *</label><input type="password" id="rpass" placeholder="Min 6 characters"/></div>
        <div id="rerr" class="err"></div>
        <button class="btn-pri" onclick="doReg()">Register →</button>
      </div>
    </div>
    <div style="text-align:center;margin-top:10px;"><a href="https://mypahad.in" style="font-size:11px;color:var(--t3);">← Back to MyPahad</a></div>
  </div>
</div>

<script>
const SU='https://khbotkadtbkwqxjxlyhm.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtoYm90a2FkdGJrd3F4anhseWhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NTU4OTAsImV4cCI6MjA4ODUzMTg5MH0.MnNTuoONyBTGZeO1qYyRUTtkRdFreK0OrOcYk66pWxs';
const {createClient}=supabase;const sb=createClient(SU,SK);
let _catCache=[];

function toast(m){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:7px 16px;border-radius:20px;z-index:9999;font-size:11px;white-space:nowrap;';document.body.appendChild(t);}t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2200);}

function authTab(t){
  ['login','reg'].forEach(x=>{
    document.getElementById('atab-'+x).classList.toggle('on',x===t);
    document.getElementById(x==='login'?'flogin':'freg').classList.toggle('hidden',x!==t);
  });
}

async function doLogin(){
  const e=document.getElementById('le').value.trim(),p=document.getElementById('lp').value;
  document.getElementById('lerr').textContent='';
  const {data,error}=await sb.auth.signInWithPassword({email:e,password:p});
  if(error){document.getElementById('lerr').textContent=error.message;return;}
  // Redirect to stats (dashboard home)
  window.location.href='stats.html';
}

async function doReg(){
  const name=document.getElementById('rname').value.trim(),uname=document.getElementById('ruser').value.trim().toLowerCase();
  const areaId=document.getElementById('rarea').value,catId=document.getElementById('rcac-id').value;
  const type=document.getElementById('rtype').value,wa=document.getElementById('rwa').value.trim();
  const ph=document.getElementById('rph').value.trim(),addr=document.getElementById('raddr').value.trim();
  const desc=document.getElementById('rdesc').value.trim(),email=document.getElementById('remail').value.trim();
  const pass=document.getElementById('rpass').value,err=document.getElementById('rerr');
  err.textContent='';
  if(!name||!areaId||!wa||!email||!pass){err.textContent='Fill all required fields.';return;}
  if(pass.length<6){err.textContent='Password min 6 chars.';return;}
  const {data,error}=await sb.auth.signUp({email,password:pass});
  if(error){err.textContent=error.message;return;}
  const uid=data.user?.id;if(!uid){err.textContent='Account creation failed.';return;}
  await sb.from('businesses').insert({user_id:uid,area_id:areaId,business_name:name,username:uname||null,category_id:catId||null,type,whatsapp:wa,phone:ph||null,address:addr||null,description:desc||null,is_approved:false,is_active:true});
  if(data.session){toast('Welcome to MyPahad!');setTimeout(()=>window.location.href='stats.html',800);}
  else{toast('Check email, then login.');authTab('login');document.getElementById('le').value=email;}
}

async function doForgot(){const e=document.getElementById('le').value.trim();if(!e){toast('Enter email first.');return;}await sb.auth.resetPasswordForEmail(e,{redirectTo:'https://partner.mypahad.in/partner.html'});toast('Reset email sent!');}

// Category autocomplete
async function refreshCatCache(){const {data}=await sb.from('categories').select('id,name').order('name');_catCache=data||[];}
function catAC(prefix,val){
  const drop=document.getElementById(prefix+'-drop');const q=(val||'').trim().toLowerCase();
  const matches=_catCache.filter(c=>c.name.toLowerCase().includes(q));
  const exactMatch=_catCache.find(c=>c.name.toLowerCase()===q);
  drop.innerHTML='';
  matches.slice(0,8).forEach(c=>{const d=document.createElement('div');d.className='cac-item';d.textContent=c.name;d.onmousedown=e=>{e.preventDefault();setCac(prefix,c.id,c.name);};drop.appendChild(d);});
  if(q.length>=2&&!exactMatch){const d=document.createElement('div');d.className='cac-item cac-item-new';d.textContent=val.trim();d.onmousedown=e=>{e.preventDefault();createAndSetCac(prefix,val.trim());};drop.appendChild(d);}
  drop.classList.toggle('open',drop.children.length>0&&document.getElementById(prefix+'-inp')===document.activeElement);
}
async function createAndSetCac(prefix,name){
  const t=name.trim();const {data:ex}=await sb.from('categories').select('id,name').ilike('name',t);
  if(ex&&ex.length){setCac(prefix,ex[0].id,ex[0].name);await refreshCatCache();return;}
  const slug=t.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  const {data:ins,error}=await sb.from('categories').insert({name:t,slug}).select().single();
  if(error){toast('Error: '+error.message);return;}
  _catCache.push({id:ins.id,name:ins.name});setCac(prefix,ins.id,ins.name);toast('Category created!');
}
function setCac(prefix,id,name){document.getElementById(prefix+'-id').value=id;document.getElementById(prefix+'-inp').value='';document.getElementById(prefix+'-drop').classList.remove('open');document.getElementById(prefix+'-pill').innerHTML=`<span class="cac-pill">${name}<button type="button" onclick="clearCac('${prefix}')">×</button></span>`;}
function clearCac(prefix){document.getElementById(prefix+'-id').value='';document.getElementById(prefix+'-inp').value='';document.getElementById(prefix+'-pill').innerHTML='';document.getElementById(prefix+'-drop').classList.remove('open');}
document.addEventListener('click',e=>{if(!e.target.closest('.cac-wrap'))document.querySelectorAll('.cac-drop').forEach(d=>d.classList.remove('open'));});

let ut;
async function chkUser(v){
  clearTimeout(ut);const el=document.getElementById('ustat');if(!el)return;
  if(!v||v.length<3){el.textContent='';return;}
  if(!/^[a-z0-9_]+$/.test(v)){el.textContent='Only a–z, 0–9, _';el.style.color='red';return;}
  ut=setTimeout(async()=>{const {data}=await sb.from('businesses').select('id').eq('username',v);const taken=data&&data.length>0;el.textContent=taken?'Taken':'Available';el.style.color=taken?'red':'green';},500);
}

async function init(){
  // Check if already logged in
  const {data:{session}}=await sb.auth.getSession();
  if(session){window.location.href='stats.html';return;}
  const {data:areas}=await sb.from('areas').select('*').eq('is_active',true).order('name');
  const ra=document.getElementById('rarea');
  areas?.forEach(a=>ra.appendChild(new Option(a.name,a.id)));
  await refreshCatCache();
}
window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
