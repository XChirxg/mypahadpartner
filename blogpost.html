function insertStyle(tag) {
  const txt = document.getElementById('econtent');
  const start = txt.selectionStart;
  const end = txt.selectionEnd;
  const selText = txt.value.substring(start, end);
  let replacement = '';
  if (tag === 'b') replacement = `<strong>${selText}</strong>`;
  else if (tag === 'i') replacement = `<em>${selText}</em>`;
  else if (tag === 'h2') replacement = `<h2>${selText}</h2>`;
  else if (tag === 'ul') replacement = `<ul>\n  <li>${selText || 'List item'}</li>\n</ul>`;
  
  txt.value = txt.value.substring(0, start) + replacement + txt.value.substring(end);
  txt.focus();
  
  const offset = replacement.indexOf(selText);
  txt.setSelectionRange(start + offset, start + offset + selText.length);
}

function prvImg(inp,pid,urlId){
  const f=inp.files[0];if(!f)return;
  if(urlId){const u=document.getElementById(urlId);if(u)u.value='';}
  const r=new FileReader();
  r.onload=e=>{
    const p=document.getElementById(pid);p.src=e.target.result;p.style.display='block';
    const delBtn = document.getElementById('btn-del-img') || document.getElementById('btn-del-img-modal');
    if (delBtn) delBtn.style.display='inline';
  };
  r.readAsDataURL(f);
}

function prvImgUrl(url,pid,fileId){

async function compress(file,kb=100){
  return new Promise(res=>{
    const r=new FileReader();r.onload=e=>{
      const img=new Image();img.onload=()=>{
        const c=document.createElement('canvas');let w=img.width,h=img.height,mx=800;
        if(w>mx||h>mx){if(w>h){h=Math.round(h*mx/w);w=mx;}else{w=Math.round(w*mx/h);h=mx;}}
        c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
        let q=0.85;const go=()=>{const d=c.toDataURL('image/webp',q);if((d.length*3/4)/1024>kb&&q>0.1){q-=0.1;go();}else res(d);};go();
      };img.src=e.target.result;
    };r.readAsDataURL(file);
  });
}

function generateUUID() {
  if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
    return crypto.randomUUID();
  }
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function generateSlug(text) {
  return text
    .toString()
    .toLowerCase()
    .trim()
    .replace(/\s+/g, '-')
    .replace(/[^\w\-]+/g, '')
    .replace(/\-\-+/g, '-')
    .replace(/^-+/, '')
    .replace(/-+$/, '');
}

function getYouTubeEmbedHtml(url) {
  const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
  const match = url.match(regExp);
  const id = (match && match[2].length === 11) ? match[2] : null;
  if (!id) return `<div style="text-align:center;padding:20px;border:1px dashed var(--bd);border-radius:var(--r);font-size:11px;color:var(--t3);">Invalid YouTube Video link.</div>`;
  return `
    <div class="post-yt-container">
      <iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
    </div>
  `;
}

async function loadPostData(){
  const urlParams = new URLSearchParams(window.location.search);
  postId = urlParams.get('id');
  if(!postId) {
    // Creation Mode
    document.getElementById('post-title-nav').textContent = 'Write Blog Post';
    document.getElementById('btn-del-post').style.display = 'none';
    renderCreationForm();
    return;
  }

  // Edit Mode
  document.getElementById('btn-del-post').style.display = 'block';
  document.getElementById('post-title-nav').textContent = 'Edit Blog Post';

  const {data: post, error} = await sb.from('posts').select('*').eq('id', postId).single();

    toast('Error loading post.');
    setTimeout(() => window.location.href = 'profile.html', 1500);
    return;

  currentPost = post;
  renderDetails();
}

function editPostField(field, label) {
  const currentVal = currentPost[field] || '';

  if (isContent) {

      </div>
    `;
  } else {
    document.getElementById('le-body').innerHTML = `
      <div class="fg">
        <label>${label}</label>
        <input type="text" id="le-inp" value="${currentVal.replace(/"/g,'&quot;')}" style="width:100%;padding:7px 9px;border:1px solid var(--bd);border-radius:var(--rs);font-size:12px;"/>
      </div>
    `;
  }
  
  leSaveFunc = async () => {
    const btn = document.getElementById('le-save-btn');
    btn.textContent = 'Saving...'; btn.disabled = true;
    const val = document.getElementById('le-inp').value.trim();
    
    if ((field === 'title' || field === 'content') && !val) {
      toast(label + ' is required.');
      btn.textContent = 'Save'; btn.disabled = false;
      return;
    }
    
    const pay = {[field]: val || null};
    if (field === 'title') {
      pay.slug = generateSlug(val);
    }
    
    const {error} = await sb.from('posts').update(pay).eq('id', postId);
    if (error) {
      toast('Error: ' + error.message);
      btn.textContent = 'Save'; btn.disabled = false;
      return;
    }
    toast('Saved!');
    closeLE();
    await loadPostData();
  };
  document.getElementById('le-mo').classList.add('open');
  setTimeout(() => document.getElementById('le-inp')?.focus(), 100);
}

function editPostMedia() {
  const p = currentPost || {};
  document.getElementById('le-title').textContent = 'Edit Media';
  document.getElementById('le-body').innerHTML = `
    <div class="fg">
      <label>Media Link Type</label>
      <select id="le-media-type" onchange="toggleMediaFieldsLE(this.value)">
        <option value="image">Upload Image</option>
        <option value="youtube">YouTube Video Link</option>
      </select>
    </div>
    <div id="media-field-image-le" class="fg">
      <label>Upload Image</label>
      <input type="file" id="le-imgf" accept="image/*" onchange="prvImg(this,'le-imgp','le-imgurl')"/>
      <div style="margin:4px 0;font-size:11px;color:var(--t3);text-align:center;">— OR —</div>
      <input type="url" id="le-imgurl" placeholder="Paste image URL (https://...)" oninput="prvImgUrl(this.value,'le-imgp','le-imgf')"/>
      <div style="margin-top:6px;display:flex;gap:8px;align-items:center;">
        <img id="le-imgp" class="img-prev"/>
        <button type="button" id="btn-del-img-modal" class="lnk" style="color:#e05a2b;display:none;font-size:11px;background:none;border:none;cursor:pointer;" onclick="clearImgModal()">Remove Image</button>
      </div>
    </div>
    <div id="media-field-youtube-le" class="fg hidden">
      <label>YouTube Video Link</label>
      <input type="url" id="le-youtube-url" placeholder="e.g. https://www.youtube.com/watch?v=..."/>
    </div>
  `;
  
  document.getElementById('le-media-type').value = p.media_type || 'image';
  toggleMediaFieldsLE(p.media_type || 'image');
  
  if (p.media_type === 'youtube') {
    document.getElementById('le-youtube-url').value = p.media_url || '';
  } else if (p.media_url) {
    const pEl = document.getElementById('le-imgp');
    pEl.src = getOptimizedImageUrl(p.media_url, 'large');
    pEl.style.display = 'block';
    document.getElementById('btn-del-img-modal').style.display = 'inline';
    if (!p.media_url.startsWith('data:')) {
      document.getElementById('le-imgurl').value = p.media_url;
    }
  }
  
  leSaveFunc = async () => {
    const btn = document.getElementById('le-save-btn');
    btn.textContent = 'Saving...'; btn.disabled = true;
    const mediaType = document.getElementById('le-media-type').value;
    let mediaUrl = null;
    
    if (mediaType === 'youtube') {
      mediaUrl = document.getElementById('le-youtube-url').value.trim() || null;
    } else {
      const f = document.getElementById('le-imgf').files[0];
      const url = document.getElementById('le-imgurl').value.trim();
      try {
        if (f) {
          mediaUrl = await uploadToCloudinary(f);
        } else if (url) {
          mediaUrl = await uploadToCloudinary(url).catch(() => url);
        } else if (document.getElementById('le-imgp').src && document.getElementById('le-imgp').style.display !== 'none') {
          mediaUrl = document.getElementById('le-imgp').src;
        }
      } catch(err) {
        toast('Upload failed: '+err.message);
        btn.textContent = 'Save'; btn.disabled = false;
        return;
      }
    }
    
    const {error} = await sb.from('posts').update({media_type: mediaType, media_url: mediaUrl}).eq('id', postId);
    if (error) {
      toast('Error: ' + error.message);
      btn.textContent = 'Save'; btn.disabled = false;
      return;
    }
    toast('Media updated!');
    closeLE();
    await loadPostData();
  };
  document.getElementById('le-mo').classList.add('open');
}

function toggleMediaFieldsLE(val) {
  if(val === 'image') {
    document.getElementById('media-field-image-le').classList.remove('hidden');
    document.getElementById('media-field-youtube-le').classList.add('hidden');
  } else {
    document.getElementById('media-field-image-le').classList.add('hidden');
    document.getElementById('media-field-youtube-le').classList.remove('hidden');
  }
}

function editPostFull() {
  const p = currentPost || {};
  document.getElementById('le-title').textContent = 'Edit Full Post';
  document.getElementById('le-body').innerHTML = `
    <div class="fg">
      <label>Title *</label>
      <input type="text" id="le-title-inp" value="${p.title.replace(/"/g,'&quot;')}"/>
    </div>
    <div class="fg">
      <label>Post Content *</label>
      <div class="editor-toolbar">
        <button type="button" class="toolbar-btn" onclick="insertStyleLEFull('b')">B</button>
        <button type="button" class="toolbar-btn" onclick="insertStyleLEFull('i')">I</button>
        <button type="button" class="toolbar-btn" onclick="insertStyleLEFull('h2')">Header</button>
        <button type="button" class="toolbar-btn" onclick="insertStyleLEFull('ul')">Bullet List</button>
      </div>
      <textarea id="le-content-inp" class="editor-textarea" rows="6">${p.content || ''}</textarea>
    </div>
    <div class="fg">
      <label>Tags</label>
      <input type="text" id="le-tags-inp" value="${p.tags || ''}"/>
    </div>
  `;
  
  leSaveFunc = async () => {
    const btn = document.getElementById('le-save-btn');
    const title = document.getElementById('le-title-inp').value.trim();
    const content = document.getElementById('le-content-inp').value.trim();
    if (!title || !content) {
      toast('Title and content are required.');
      return;
    }
    btn.textContent = 'Saving...'; btn.disabled = true;
    const slug = generateSlug(title);
    
    const pay = {
      title,
      content,
      slug,
      tags: document.getElementById('le-tags-inp').value.trim() || null
    };
    
    const {error} = await sb.from('posts').update(pay).eq('id', postId);
    if (error) {
      toast('Error: ' + error.message);
      btn.textContent = 'Save'; btn.disabled = false;
      return;
    }
    toast('Post updated!');
    closeLE();
    await loadPostData();
  };
  document.getElementById('le-mo').classList.add('open');
}

async function saveNewPost(){
  const title=document.getElementById('etitle').value.trim();
  const content=document.getElementById('econtent').value.trim();
  const errEl=document.getElementById('add-err');
  errEl.textContent='';
  if(!title || !content){errEl.textContent='Title and Content are required.';return;}

  const btn=document.getElementById('save-btn');
  btn.textContent='Publishing…';btn.disabled=true;

  const mediaType = document.getElementById('emedia_type').value;
  let mediaUrl = null;

  if(mediaType === 'youtube') {
    mediaUrl = document.getElementById('eyoutube_url').value.trim() || null;
  } else {
    const imf=document.getElementById('eimg').files[0];
    const urlInp=document.getElementById('eimgurl').value.trim();
    try {
      if(imf) mediaUrl = await uploadToCloudinary(imf);
      else if(urlInp) mediaUrl = await uploadToCloudinary(urlInp).catch(() => urlInp);
    } catch(err) {
      errEl.textContent='Media upload failed: '+err.message;
      btn.textContent='Publish Post';btn.disabled=false;
      return;
    }
  }

  const slug = generateSlug(title);

  const pay={
    id: generateUUID(),
    title,
    content,
    slug,
    tags: document.getElementById('etags').value.trim() || null,
    media_type: mediaType,
    media_url: mediaUrl,
    business_id: biz.id
  };

  const {error} = await sb.from('posts').insert(pay);
  if(error){errEl.textContent=error.message;btn.textContent='Publish Post';btn.disabled=false;return;}
  
  toast('Post published!');
  setTimeout(()=>goBack(),700);
}

async function deletePost(){
  if(!confirm('Are you sure you want to delete this blog post?')) return;
  const {error} = await sb.from('posts').delete().eq('id', postId);
  if(error) {
    toast('Error: ' + error.message);
  } else {
    toast('Post deleted!');
    setTimeout(()=>window.location.href='profile.html',700);
  }
}

// ===== INIT =====
async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  cu=session.user;
  const {data:b}=await sb.from('businesses').select('*').eq('user_id',cu.id).single();
  if(!b){toast('No business found.');setTimeout(()=>window.location.href='partner.html',1500);return;}
  biz=b;
  await loadPostData();
}
window.addEventListener('DOMContentLoaded',init);
</script>
